<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Cartoon Story Generator</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <h1 title="High-Quality AI Animation Engine">🎬 Pixar Movie Maker 🎬</h1>

    <div class="container fade-in">
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form id="storyForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="image">📸 Upload a Photo to Animate</label>
                <input type="file" id="image" name="image" accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="hero">🧙‍♂️ Hero's Name</label>
                <input type="text" id="hero" name="hero" placeholder="e.g. Luna the Brave" required>
            </div>

            <div class="form-group">
                <label for="language">🌍 Narration Language</label>
                <select id="language" name="language" required
                    style="width: 100%; padding: 1.1rem; border: 2px solid rgba(0,0,0,0.05); border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 1.1rem; background: rgba(255,255,255,0.8);">
                    <option value="English">English</option>
                    <option value="Kannada">Kannada</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Spanish">Spanish</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Generate Animated Movie! 🎞️</button>
            <div id="loader" class="spinner"></div>
            <div id="waitMsg" style="display: none; text-align: center; margin-top: 2rem; font-size: 1.1rem; line-height: 1.6; color: #666; font-weight: 500;">
                <span style="font-size: 1.5rem;">📽️</span><br>
                <b>Directing your Pixar Masterpiece...</b><br>
                We are generating 5 unique animated scenes with cinematic lighting.<br>
                <small>(Estimated wait: 2-3 minutes. Magic takes time!)</small>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('storyForm').addEventListener('submit', function () {
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('waitMsg').style.display = 'block';
        });
    </script>
</body>

</html>
